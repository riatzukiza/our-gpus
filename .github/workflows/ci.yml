name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check app/ worker/ cli/ tests/

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: |
          uv run pytest tests/ -v --cov=app --cov=worker --cov-report=xml
          
      - name: Clean up test database
        if: always()
        run: |
          rm -f ./test_ci.db
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        working-directory: ./web
        run: bun install
      
      - name: Type check
        working-directory: ./web
        run: bun run type-check
      
      - name: Build
        working-directory: ./web
        run: bun run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image
        run: docker build -f Dockerfile.api -t ollama-discovery-api .
      
      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t ollama-discovery-worker .
      
      - name: Build Web image
        run: docker build -f web/Dockerfile -t ollama-discovery-web ./web

  integration:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d
      
      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:18000/healthz; do sleep 2; done'

      - name: Run smoke tests
        run: |
          curl -f http://localhost:18000/healthz
          curl -f http://localhost:18000/readyz
          curl -f http://localhost:18000/api/hosts
      
      - name: Stop services
        if: always()
        run: docker compose down -v
