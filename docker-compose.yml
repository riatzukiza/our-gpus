services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "18000", "--reload"]
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - DATABASE_URL=${API_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-our_gpus}:${POSTGRES_PASSWORD:-our_gpus_dev_password}@127.0.0.1:5432/${POSTGRES_DB:-our_gpus}}
      - MASSCAN_INTERFACE=eth0
      - REDIS_URL=redis://127.0.0.1:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ./worker:/app/worker
      - ./app:/app/app
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - DATABASE_URL=${WORKER_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-our_gpus}:${POSTGRES_PASSWORD:-our_gpus_dev_password}@postgres:5432/${POSTGRES_DB:-our_gpus}}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-our_gpus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-our_gpus_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-our_gpus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-our_gpus} -d ${POSTGRES_DB:-our_gpus}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "15173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VITE_API_URL=http://host.docker.internal:18000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
